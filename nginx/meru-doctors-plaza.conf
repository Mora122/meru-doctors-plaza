# /etc/nginx/sites-available/meru-doctors-plaza
# Symlink: sudo ln -s /etc/nginx/sites-available/meru-doctors-plaza /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name merudoctorsplaza.co.ke www.merudoctorsplaza.co.ke;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name merudoctorsplaza.co.ke www.merudoctorsplaza.co.ke;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/merudoctorsplaza.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/merudoctorsplaza.co.ke/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── Frontend (React SPA via Docker) ──────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cache HTML — short TTL (React Router pages)
        proxy_cache_bypass $http_upgrade;
    }

    # ── Backend API ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Rate limiting at Nginx level
        limit_req zone=api burst=20 nodelay;
    }

    # ── Health check endpoint ────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:5000/health;
    }

    # ── Static asset caching ─────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|webp|svg|woff2?)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# Rate limiting zone definition (add to /etc/nginx/nginx.conf http block)
# limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
